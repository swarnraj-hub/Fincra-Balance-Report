name: Fincra Pay-In Export

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "From Date (YYYY-MM-DD)"
        required: true
        type: string
      end_date:
        description: "To Date (YYYY-MM-DD) — leave blank to default to today"
        required: false
        type: string

  # Optional: run automatically every weekday at 09:00 UTC
  # schedule:
  #   - cron: "0 9 * * 1-5"

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright pyotp requests
          playwright install chromium --with-deps

      - name: Run export
        env:
          FINCRA_USERNAME:    ${{ secrets.FINCRA_USERNAME }}
          FINCRA_PASSWORD:    ${{ secrets.FINCRA_PASSWORD }}
          FINCRA_TOTP_SECRET: ${{ secrets.FINCRA_TOTP_SECRET }}
          SLACK_BOT_TOKEN:    ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:      ${{ secrets.SLACK_USER_ID }}
          CI: "true"
        run: |
          START="${{ github.event.inputs.start_date }}"
          END="${{ github.event.inputs.end_date }}"

          if [ -z "$END" ]; then
            python fincra_balance_report.py --start_date "$START"
          else
            python fincra_balance_report.py --start_date "$START" --end_date "$END"
          fi

      - name: Upload debug screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: fincra_*.png
          retention-days: 7
