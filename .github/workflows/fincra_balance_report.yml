name: Fincra Balance Report

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "From Date (YYYY-MM-DD) — sourced from Google Sheets via n8n"
        required: true
        type: string
      end_date:
        description: "To Date (YYYY-MM-DD) — optional (defaults to today)"
        required: false
        type: string

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ---------------------------------------------------------------------
      # Checkout
      # ---------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # Python setup
      # ---------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyotp requests
          playwright install chromium --with-deps

      # ---------------------------------------------------------------------
      # Run script
      # ---------------------------------------------------------------------
      - name: Run Fincra Balance Report export
        env:
          FINCRA_USERNAME:     ${{ secrets.FINCRA_USERNAME }}
          FINCRA_PASSWORD:     ${{ secrets.FINCRA_PASSWORD }}
          FINCRA_TOTP_SECRET:  ${{ secrets.FINCRA_TOTP_SECRET }}
          SLACK_BOT_TOKEN:     ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_USER_ID:       ${{ secrets.SLACK_USER_ID }}
          CI: "true"
        run: |
          echo "======================================="
          echo "Fincra Balance Report Execution"
          echo "Start Date: ${{ github.event.inputs.start_date }}"
          echo "End Date:   ${{ github.event.inputs.end_date || 'today (auto)' }}"
          echo "======================================="

          if [ -z "${{ github.event.inputs.end_date }}" ]; then
            python fincra_balance_report.py \
              --start_date "${{ github.event.inputs.start_date }}"
          else
            python fincra_balance_report.py \
              --start_date "${{ github.event.inputs.start_date }}" \
              --end_date   "${{ github.event.inputs.end_date }}"
          fi

      # ---------------------------------------------------------------------
      # Upload CSV
      # ---------------------------------------------------------------------
      - name: Upload CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fincra-balance-report-${{ github.event.inputs.start_date }}-to-${{ github.event.inputs.end_date || 'today' }}
          path: downloads/FINCRA_PAYIN_*.csv
          retention-days: 30

      # ---------------------------------------------------------------------
      # Upload debug screenshots if failure
      # ---------------------------------------------------------------------
      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: fincra_payin_*.png
          retention-days: 7
